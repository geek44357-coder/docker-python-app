name: Docker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t my-python-app .
    - name: Send notification to Gotify
      run: |
        curl "https://random-name.trycloudflare.com/message?token=A0Sur_SlG8RkBw4" -F "title=CI/CD" -F "message=Сборка завершена"
