name: Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Клонирование репозитория
      uses: actions/checkout@v3

    - name: 🐳 Сборка Docker-образа
      run: docker build -t my-python-app .

    - name: 🚀 Запуск контейнера
      run: docker run -d -p 5000:5000 my-python-app

    - name: 🔍 Проверка контейнеров
      run: docker ps

    - name: 📡 Отправка уведомления в Gotify
      run: |
        curl "https://ТВОЙ_АДРЕС.trycloudflare.com/message?token=A0Sur_SlG8RkBw4" \
        -F "title=CI/CD" \
        -F "message=Сборка и запуск выполнены успешно"
